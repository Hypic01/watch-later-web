<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Laterlist Sync</title>
    <style>
      /* Matches the site's Laterlist system: monochrome Woodsmoke/Gainsboro,
         no accent hue, sans wordmark, mono for status/data. */
      :root { color-scheme: dark; font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }
      * { box-sizing: border-box; }
      body { width: 320px; margin: 0; padding: 18px; background: #191919; color: #D9D9D9; }
      header { display: flex; align-items: center; gap: 11px; }
      .mark {
        width: 34px; height: 34px; border-radius: 9px; display: grid; place-items: center;
        color: #D9D9D9; border: 1px solid rgba(217,217,217,.20); background: rgba(217,217,217,.06);
      }
      h1 { margin: 0; font-size: 17px; font-weight: 700; letter-spacing: -.01em; }
      .email { min-height: 18px; margin: 16px 0 3px; color: #D9D9D9; font-size: 12px; font-family: ui-monospace, monospace; }
      .last-sync { min-height: 17px; margin: 0 0 8px; color: #6E6E6E; font-size: 11px; font-family: ui-monospace, monospace; }
      .status { min-height: 38px; margin: 0; color: #9A9A9A; font-size: 13px; line-height: 1.45; }
      .schedule { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 6px 12px; margin-top: 14px; padding: 11px 12px; border: 1px solid rgba(217,217,217,.10); border-radius: 11px; background: #212121; }
      .schedule label { color: #D9D9D9; font-size: 12px; font-weight: 600; }
      .schedule select { min-width: 118px; border: 1px solid rgba(217,217,217,.20); border-radius: 7px; padding: 7px 26px 7px 9px; background: #292929; color: #D9D9D9; font: inherit; font-size: 12px; }
      .schedule select:focus-visible { outline: 2px solid #D9D9D9; outline-offset: 2px; }
      .schedule select:disabled { opacity: .55; }
      .schedule-note { grid-column: 1 / -1; min-height: 15px; margin: 0; color: #6E6E6E; font-size: 11px; line-height: 1.35; }
      .actions { display: grid; gap: 8px; margin-top: 14px; }
      button, a { font: inherit; }
      button { border: 1px solid transparent; border-radius: 7px; padding: 10px 14px; font-weight: 600; cursor: pointer; }
      button:disabled { opacity: .45; cursor: default; }
      /* Monochrome: the filled button is Gainsboro with Woodsmoke text. */
      .primary { background: #D9D9D9; color: #191919; }
      .primary:hover:not(:disabled) { background: #BFBFBF; }
      .secondary { background: #2E2E2E; color: #D9D9D9; border-color: rgba(217,217,217,.10); }
      .secondary:hover:not(:disabled) { background: #292929; border-color: rgba(217,217,217,.20); }
      .foot { display: inline-block; margin-top: 15px; color: #9A9A9A; font-size: 12px; text-decoration: none; }
      .foot:hover { color: #D9D9D9; }
    </style>
  </head>
  <body>
    <header>
      <span class="mark" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 6h10M4 12h10M4 18h6" /><path d="M15 15l3 3 4-5" />
        </svg>
      </span>
      <h1>Laterlist</h1>
    </header>
    <p class="email" data-email></p>
    <p class="last-sync" data-last-sync>Last sync: checking.</p>
    <p class="status" data-status>Reading extension status.</p>
    <div class="schedule">
      <label for="auto-sync-minutes">Auto-sync</label>
      <select id="auto-sync-minutes" data-auto-sync aria-describedby="auto-sync-note" disabled>
        <option value="360">Every 6 hours</option>
        <option value="1440">Daily</option>
        <option value="0">Off</option>
      </select>
      <p class="schedule-note" id="auto-sync-note" data-auto-sync-note aria-live="polite">Reading auto sync setting.</p>
    </div>
    <div class="actions">
      <button class="primary" type="button" data-sync-delta>Sync new videos</button>
      <button class="secondary" type="button" data-sync-full>Run a full sync</button>
    </div>
    <a class="foot" data-open-app href="https://watch-later-web.vercel.app/app">Open Laterlist</a>
    <script src="popup.js"></script>
  </body>
</html>
