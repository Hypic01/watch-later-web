<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Watch Later Librarian Sync</title>
    <style>
      /* Matches the site's "Archive" system: warm near-black, one brass accent,
         serif for the wordmark, mono for status/data. */
      :root { color-scheme: dark; font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }
      * { box-sizing: border-box; }
      body { width: 320px; margin: 0; padding: 18px; background: #12110F; color: #F4EFE6; }
      header { display: flex; align-items: center; gap: 11px; }
      .mark {
        width: 34px; height: 34px; border-radius: 50%; display: grid; place-items: center;
        color: #C9A227; border: 1px solid rgba(201,162,39,.42); background: rgba(201,162,39,.09);
      }
      h1 { margin: 0; font-family: Georgia, 'Times New Roman', serif; font-size: 17px; font-weight: 500; letter-spacing: .004em; }
      .email { min-height: 18px; margin: 16px 0 3px; color: #C9A227; font-size: 12px; font-family: ui-monospace, monospace; }
      .last-sync { min-height: 17px; margin: 0 0 8px; color: #968A79; font-size: 11px; font-family: ui-monospace, monospace; }
      .status { min-height: 38px; margin: 0; color: #A89C8A; font-size: 13px; line-height: 1.45; }
      .schedule { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 6px 12px; margin-top: 14px; padding: 11px 12px; border: 1px solid rgba(244,239,230,.10); border-radius: 11px; background: #1A1815; }
      .schedule label { color: #F4EFE6; font-size: 12px; font-weight: 600; }
      .schedule select { min-width: 118px; border: 1px solid rgba(244,239,230,.20); border-radius: 7px; padding: 7px 26px 7px 9px; background: #221F1B; color: #F4EFE6; font: inherit; font-size: 12px; }
      .schedule select:focus-visible { outline: 2px solid #C9A227; outline-offset: 2px; }
      .schedule select:disabled { opacity: .55; }
      .schedule-note { grid-column: 1 / -1; min-height: 15px; margin: 0; color: #968A79; font-size: 11px; line-height: 1.35; }
      .actions { display: grid; gap: 8px; margin-top: 14px; }
      button, a { font: inherit; }
      button { border: 1px solid transparent; border-radius: 7px; padding: 10px 14px; font-weight: 600; cursor: pointer; }
      button:disabled { opacity: .45; cursor: default; }
      /* Brass is light, so filled buttons take the dark foreground, never white. */
      .primary { background: #C9A227; color: #17130A; }
      .primary:hover:not(:disabled) { background: #DFBE5C; }
      .secondary { background: #262320; color: #F4EFE6; border-color: rgba(244,239,230,.10); }
      .secondary:hover:not(:disabled) { background: #221F1B; border-color: rgba(244,239,230,.20); }
      .foot { display: inline-block; margin-top: 15px; color: #A89C8A; font-size: 12px; text-decoration: none; }
      .foot:hover { color: #F4EFE6; }
    </style>
  </head>
  <body>
    <header>
      <span class="mark" aria-hidden="true">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round">
          <path d="M4 5h7v14H4zM13 5h7v14h-7" /><path d="M4 9.5h7M13 9.5h7" />
        </svg>
      </span>
      <h1>The Watch Later Librarian</h1>
    </header>
    <p class="email" data-email></p>
    <p class="last-sync" data-last-sync>Last sync: checking.</p>
    <p class="status" data-status>Reading extension status.</p>
    <div class="schedule">
      <label for="auto-sync-minutes">Auto-sync</label>
      <select id="auto-sync-minutes" data-auto-sync aria-describedby="auto-sync-note" disabled>
        <option value="360">Every 6 hours</option>
        <option value="1440">Daily</option>
        <option value="0">Off</option>
      </select>
      <p class="schedule-note" id="auto-sync-note" data-auto-sync-note aria-live="polite">Reading auto sync setting.</p>
    </div>
    <div class="actions">
      <button class="primary" type="button" data-sync-delta>Sync new videos</button>
      <button class="secondary" type="button" data-sync-full>Run a full sync</button>
    </div>
    <a class="foot" data-open-app href="https://watch-later-web.vercel.app/app">Open The Watch Later Librarian</a>
    <script src="popup.js"></script>
  </body>
</html>
